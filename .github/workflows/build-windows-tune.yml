name: Build Windows Tune EXE

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-windows-tune.yml"
      - "build_tune_exe.py"
      - "build_tune_exe.bat"
      - "meshLogger.py"
      - "meshLogger_tune_entry.py"
      - "meshtastic_listen_helper.py"
      - "pyproject.toml"

jobs:
  build-windows-tune:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller meshtastic

      - name: Build meshLoggerTune.exe
        run: |
          python build_tune_exe.py

      - name: Upload meshLoggerTune artifact
        uses: actions/upload-artifact@v4
        with:
          name: meshLoggerTune-windows
          path: |
            dist/meshLoggerTune.exe
          if-no-files-found: error
